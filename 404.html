<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Rolly Calma</title>
  
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="/style.css" />
  <style>
    .error-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .error-code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 40px var(--accent-glow);
    }
    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      margin-bottom: 16px;
    }
    .error-sub {
      color: var(--text-secondary);
      margin-bottom: 40px;
      max-width: 400px;
    }
  </style>
</head>
<body class="page-loaded">
  <section class="error-section">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-sub">It looks like the link is broken or the page has been moved.</p>
    <a href="/" class="btn btn-primary">Return Home</a>
  </section>
</body>
</html>
